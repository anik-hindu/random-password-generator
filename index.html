<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="./script.js"></script>
  </head>
  <body>
    <div class="main">
      <h1 class="heading-main">
        Generate a <br /><span id="highlight">random password</span>
      </h1>
      <p class="support-main">Never use an insecure password again.</p>
      <div class="password-length">
        <label for="password-length">Password Length</label>
        <input
          type="range"
          id="password-length"
          name="Length"
          min="8"
          max="20"
          value="15"
          step="1"
          oninput="currentLength.value = this.value"
        />
        <output id="currentLength">15</output>
      </div>
      <fieldset class="characters">
        <legend>Select Characters</legend>
        <input type="checkbox" name="uppercase" id="upperCase" checked />
        <label for="upperCase">UpperCase</label>

        <input type="checkbox" name="lowercase" id="lowerCase" checked />
        <label for="lowerCase">LowerCase</label>

        <input type="checkbox" name="symbols" id="symbols" checked />
        <label for="symbols">Symbols</label>

        <input type="checkbox" name="numbers" id="numbers" checked />
        <label for="numbers">Numbers</label>
      </fieldset>
      <button id="generate-btn">Generate passwords</button>
      <div class="line"></div>
      <div class="password-container">
        <button class="password" id="password-one"></button>
        <button class="password" id="password-two"></button>
      </div>
    </div>
  </body>
</html>
